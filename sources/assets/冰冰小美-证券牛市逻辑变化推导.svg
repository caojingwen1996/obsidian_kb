<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1460" viewBox="0 0 1600 1460">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f0fdfa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="13" markerHeight="13" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style><![CDATA[
      .font { font-family: "Microsoft YaHei", "Noto Sans CJK SC", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif; }
      .title { font-size: 38px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-size: 18px; fill: #64748b; }
      .card-title { font-size: 27px; font-weight: 700; fill: #111827; }
      .card-body { font-size: 20px; fill: #374151; }
      .note { font-size: 16px; fill: #64748b; }
      .pill { font-size: 23px; font-weight: 700; fill: #ffffff; }
    ]]></style>
  </defs>
  <rect width="1600" height="1460" fill="url(#bg)"/>
  <g class="font">

<text x="800" y="56" text-anchor="middle" class="title">
  <tspan x="800" dy="0">证券不再简单等于“牛市旗手”</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="subtitle">
  <tspan x="800" dy="0">原文逻辑推导图：从六条证据链推出“不要机械牛市买券商”。</tspan>
</text>
<rect x="421" y="130" width="770" height="88" rx="22" fill="#000000" opacity="0.08"/>
<rect x="415" y="122" width="770" height="88" rx="22" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
<rect x="415" y="122" width="10" height="88" rx="5" fill="#64748b"/>
<text x="443" y="169" text-anchor="start" class="card-title">
  <tspan x="443" dy="0">起点问题</tspan>
</text>
<text x="443" y="200" text-anchor="start" class="card-body">
  <tspan x="443" dy="0">牛市里，为什么证券 / 券商和以往不一样？</tspan>
</text>
<path d="M 800 210 L 800 242" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="166" y="256" width="1280" height="138" rx="22" fill="#000000" opacity="0.08"/>
<rect x="160" y="248" width="1280" height="138" rx="22" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/>
<rect x="160" y="248" width="10" height="138" rx="5" fill="#2563eb"/>
<text x="188" y="295" text-anchor="start" class="card-title">
  <tspan x="188" dy="0">总判断：券商性质发生变化</tspan>
</text>
<text x="188" y="334" text-anchor="start" class="card-body">
  <tspan x="188" dy="0">过去逻辑：牛市旗手、行情发动机、旱涝保收。</tspan>
  <tspan x="188" dy="31">当前逻辑：更像政策与指数调节工具，同时受资产质量、外资竞争、流动性周期约束。</tspan>
</text>
<path d="M 800 386 L 800 421" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
<rect x="580" y="424" width="440" height="46" rx="23" fill="#0f172a" opacity="0.94"/>
<text x="800" y="455" text-anchor="middle" class="pill">
  <tspan x="800" dy="0">六条支撑证据链</tspan>
</text>
<rect x="81" y="518" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="75" y="510" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="75" y="510" width="10" height="230" rx="5" fill="#ef4444"/>
<circle cx="111" cy="548" r="21" fill="#ef4444"/>
<text x="111" y="556" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="111" dy="0">1</tspan>
</text>
<text x="145" y="557" text-anchor="start" class="card-title">
  <tspan x="145" dy="0">924 行情的反例</tspan>
</text>
<text x="103" y="598" text-anchor="start" class="card-body">
  <tspan x="103" dy="0">一周暴涨 → 激发牛市幻想</tspan>
  <tspan x="103" dy="31">随后被对冲基金做空</tspan>
  <tspan x="103" dy="31">三个月港股跌回 924 低点</tspan>
  <tspan x="103" dy="31">推论：暴涨不等于可持续主线</tspan>
</text>
<rect x="591" y="518" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="585" y="510" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="585" y="510" width="10" height="230" rx="5" fill="#2563eb"/>
<circle cx="621" cy="548" r="21" fill="#2563eb"/>
<text x="621" y="556" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="621" dy="0">2</tspan>
</text>
<text x="655" y="557" text-anchor="start" class="card-title">
  <tspan x="655" dy="0">政策定位变化</tspan>
</text>
<text x="613" y="598" text-anchor="start" class="card-body">
  <tspan x="613" dy="0">从“牛市旗手”变为“工具人”</tspan>
  <tspan x="613" dy="31">受央妈与监管目标约束</tspan>
  <tspan x="613" dy="31">用于调节指数运行</tspan>
  <tspan x="613" dy="31">推论：上涨空间受政策意图影响</tspan>
</text>
<rect x="1101" y="518" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="1095" y="510" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="1095" y="510" width="10" height="230" rx="5" fill="#7c3aed"/>
<circle cx="1131" cy="548" r="21" fill="#7c3aed"/>
<text x="1131" y="556" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="1131" dy="0">3</tspan>
</text>
<text x="1165" y="557" text-anchor="start" class="card-title">
  <tspan x="1165" dy="0">稳定币主题退潮</tspan>
</text>
<text x="1123" y="598" text-anchor="start" class="card-body">
  <tspan x="1123" dy="0">借美元稳定币概念大涨一波</tspan>
  <tspan x="1123" dy="31">但被央妈否定，定性违法</tspan>
  <tspan x="1123" dy="31">比特币见顶后证券同步回落</tspan>
  <tspan x="1123" dy="31">推论：主题催化不是基本面改善</tspan>
</text>
<rect x="81" y="798" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="75" y="790" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="75" y="790" width="10" height="230" rx="5" fill="#f59e0b"/>
<circle cx="111" cy="828" r="21" fill="#f59e0b"/>
<text x="111" y="836" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="111" dy="0">4</tspan>
</text>
<text x="145" y="837" text-anchor="start" class="card-title">
  <tspan x="145" dy="0">房地产债券风险</tspan>
</text>
<text x="103" y="878" text-anchor="start" class="card-body">
  <tspan x="103" dy="0">券商持有大量房地产债券</tspan>
  <tspan x="103" dy="31">地产暴雷，万科大幅亏损</tspan>
  <tspan x="103" dy="31">资产可能计提、打折</tspan>
  <tspan x="103" dy="31">推论：财报盈利需核验真实质量</tspan>
</text>
<rect x="591" y="798" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="585" y="790" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="585" y="790" width="10" height="230" rx="5" fill="#059669"/>
<circle cx="621" cy="828" r="21" fill="#059669"/>
<text x="621" y="836" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="621" dy="0">5</tspan>
</text>
<text x="655" y="837" text-anchor="start" class="card-title">
  <tspan x="655" dy="0">外资金融准入</tspan>
</text>
<text x="613" y="878" text-anchor="start" class="card-body">
  <tspan x="613" dy="0">外资金融控股比例可超过 51%</tspan>
  <tspan x="613" dy="31">外资投行进入国内市场</tspan>
  <tspan x="613" dy="31">国内券商业务被挤压并推动合并</tspan>
  <tspan x="613" dy="31">推论：竞争格局已实质变化</tspan>
</text>
<rect x="1101" y="798" width="430" height="230" rx="22" fill="#000000" opacity="0.08"/>
<rect x="1095" y="790" width="430" height="230" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="1095" y="790" width="10" height="230" rx="5" fill="#0891b2"/>
<circle cx="1131" cy="828" r="21" fill="#0891b2"/>
<text x="1131" y="836" text-anchor="middle" font-size="24" font-weight="700" fill="#ffffff">
  <tspan x="1131" dy="0">6</tspan>
</text>
<text x="1165" y="837" text-anchor="start" class="card-title">
  <tspan x="1165" dy="0">流动性周期绑定</tspan>
</text>
<text x="1123" y="878" text-anchor="start" class="card-body">
  <tspan x="1123" dy="0">券商与流动性牛市强相关</tspan>
  <tspan x="1123" dy="31">流动性波动 → 券商跟随波动</tspan>
  <tspan x="1123" dy="31">薪酬下降反映行业景气承压</tspan>
  <tspan x="1123" dy="31">推论：牛市 beta 不再稳定兑现</tspan>
</text>
<path d="M 800 470 C 800 492, 290 492, 290 502" fill="none" stroke="#94a3b8" stroke-width="2.3" stroke-dasharray="6 8" stroke-linecap="round" opacity="0.85" marker-end="url(#arrow)"/>
<path d="M 800 470 C 800 492, 800 492, 800 502" fill="none" stroke="#94a3b8" stroke-width="2.3" stroke-dasharray="6 8" stroke-linecap="round" opacity="0.85" marker-end="url(#arrow)"/>
<path d="M 800 470 C 800 492, 1310 492, 1310 502" fill="none" stroke="#94a3b8" stroke-width="2.3" stroke-dasharray="6 8" stroke-linecap="round" opacity="0.85" marker-end="url(#arrow)"/>
<path d="M 290 740 L 290 782" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 8" stroke-linecap="round" opacity="0.95" marker-end="url(#arrow)"/>
<path d="M 800 740 L 800 782" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 8" stroke-linecap="round" opacity="0.95" marker-end="url(#arrow)"/>
<path d="M 1310 740 L 1310 782" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 8" stroke-linecap="round" opacity="0.95" marker-end="url(#arrow)"/>
<path d="M 235 1045 C 420 1090, 1180 1090, 1365 1045" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 8" opacity="0.9"/>
<path d="M 800 1020 L 800 1088" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="151" y="1104" width="1310" height="134" rx="22" fill="#000000" opacity="0.08"/>
<rect x="145" y="1096" width="1310" height="134" rx="22" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
<rect x="145" y="1096" width="10" height="134" rx="5" fill="#0f172a"/>
<text x="173" y="1143" text-anchor="start" class="card-title">
  <tspan x="173" dy="0">综合推导</tspan>
</text>
<text x="173" y="1182" text-anchor="start" class="card-body">
  <tspan x="173" dy="0">短期情绪、主题炒作、政策预期、流动性放松都可能推涨券商；</tspan>
  <tspan x="173" dy="31">但可持续性同时被政策工具属性、资产质量、外资竞争、流动性周期共同压制。</tspan>
</text>
<path d="M 800 1230 L 800 1266" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<rect x="266" y="1284" width="1080" height="112" rx="22" fill="#000000" opacity="0.08"/>
<rect x="260" y="1276" width="1080" height="112" rx="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
<rect x="260" y="1276" width="10" height="112" rx="5" fill="#ea580c"/>
<text x="288" y="1323" text-anchor="start" class="card-title">
  <tspan x="288" dy="0">最终结论</tspan>
</text>
<text x="288" y="1360" text-anchor="start" class="card-body">
  <tspan x="288" dy="0">不能再机械套用“牛市涨券商 / 牛市买券商”；</tspan>
  <tspan x="288" dy="30">需要重新评估券商行业逻辑是否真的改善。</tspan>
</text>
<text x="800" y="1430" text-anchor="middle" class="note">
  <tspan x="800" dy="0">注：本图是对原文观点的结构化整理，不代表事实核验或投资建议。</tspan>
</text>

  </g>
</svg>
