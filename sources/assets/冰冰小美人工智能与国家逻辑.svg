<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1320" viewBox="0 0 1600 1320">
  <defs>
    <style>
      .bg { fill:#f8fafc; }
      .title { font: 700 34px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#0f172a; }
      .subtitle { font: 400 18px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#475569; }
      .section { font: 700 22px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#1e293b; }
      .node-title { font: 700 18px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#0f172a; }
      .node-text { font: 400 15px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#334155; }
      .small { font: 400 13px 'Microsoft YaHei','PingFang SC','Noto Sans CJK SC',Arial,sans-serif; fill:#64748b; }
      .box { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; rx:18; ry:18; filter:url(#shadow); }
      .box-blue { fill:#eff6ff; stroke:#93c5fd; stroke-width:1.8; rx:18; ry:18; filter:url(#shadow); }
      .box-green { fill:#f0fdf4; stroke:#86efac; stroke-width:1.8; rx:18; ry:18; filter:url(#shadow); }
      .box-amber { fill:#fffbeb; stroke:#fcd34d; stroke-width:1.8; rx:18; ry:18; filter:url(#shadow); }
      .box-red { fill:#fef2f2; stroke:#fca5a5; stroke-width:1.8; rx:18; ry:18; filter:url(#shadow); }
      .box-purple { fill:#faf5ff; stroke:#d8b4fe; stroke-width:1.8; rx:18; ry:18; filter:url(#shadow); }
      .tag { fill:#e2e8f0; rx:12; ry:12; }
      .arrow { stroke:#64748b; stroke-width:2.2; fill:none; marker-end:url(#arrow); }
      .arrow-strong { stroke:#2563eb; stroke-width:3; fill:none; marker-end:url(#arrowBlue); }
      .dash { stroke:#94a3b8; stroke-width:2; fill:none; stroke-dasharray:7 7; marker-end:url(#arrow); }
      .bracket { stroke:#334155; stroke-width:2; fill:none; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1320"/>
  <text class="title" x="70" y="70">《AI与国家》主题与推导逻辑</text>
  <text class="subtitle" x="70" y="105">作者把市场判断从“短线交易”上升到“中美重新定位—AI工业革命门票—全球国家分层—通胀风险变量”的宏观框架。</text>

  <!-- top thesis -->
  <rect class="box-blue" x="430" y="145" width="740" height="120"/>
  <text class="node-title" x="800" y="180" text-anchor="middle">中心命题</text>
  <text class="node-text" x="800" y="212" text-anchor="middle">中美竞争被重新定性为“可控竞争 / 不主动冲突”</text>
  <text class="node-text" x="800" y="238" text-anchor="middle">AI成为第四次工业革命的国家级门票，门已基本关闭</text>

  <!-- Section 1 -->
  <text class="section" x="70" y="330">一、先排除最大风险：战争 / 地缘失控</text>
  <rect class="box" x="70" y="360" width="330" height="120"/>
  <text class="node-title" x="235" y="395" text-anchor="middle">中美关系重新定位</text>
  <text class="node-text" x="235" y="425" text-anchor="middle">竞争定性 + 善意发出</text>
  <text class="node-text" x="235" y="450" text-anchor="middle">我国不会主动挑起冲突</text>

  <rect class="box" x="470" y="360" width="330" height="120"/>
  <text class="node-title" x="635" y="395" text-anchor="middle">亚太外溢风险下降</text>
  <text class="node-text" x="635" y="425" text-anchor="middle">台海、日韩、越南、印巴等</text>
  <text class="node-text" x="635" y="450" text-anchor="middle">潜在 war 因素被压低</text>

  <rect class="box-green" x="870" y="360" width="330" height="120"/>
  <text class="node-title" x="1035" y="395" text-anchor="middle">亚太成为相对安全港</text>
  <text class="node-text" x="1035" y="425" text-anchor="middle">相较欧洲、中东、南美、非洲</text>
  <text class="node-text" x="1035" y="450" text-anchor="middle">金融风险传导烈度更低</text>

  <rect class="box-amber" x="1270" y="360" width="260" height="120"/>
  <text class="node-title" x="1400" y="395" text-anchor="middle">剩余警惕点</text>
  <text class="node-text" x="1400" y="425" text-anchor="middle">中亚 / 俄欧关系</text>
  <text class="node-text" x="1400" y="450" text-anchor="middle">但不构成主线风险</text>

  <path class="arrow" d="M400 420 H465"/>
  <path class="arrow" d="M800 420 H865"/>
  <path class="arrow" d="M1200 420 H1265"/>

  <!-- Section 2 -->
  <text class="section" x="70" y="555">二、再解释市场为什么能“看多长期”</text>
  <rect class="box-red" x="70" y="585" width="340" height="130"/>
  <text class="node-title" x="240" y="620" text-anchor="middle">现实状态：初级泡沫</text>
  <text class="node-text" x="240" y="650" text-anchor="middle">2022-2026 债务扩张</text>
  <text class="node-text" x="240" y="675" text-anchor="middle">主要由 AI 投资扩张推动</text>
  <text class="small" x="240" y="700" text-anchor="middle">泡沫可见，但刺破成本极高</text>

  <rect class="box" x="480" y="585" width="340" height="130"/>
  <text class="node-title" x="650" y="620" text-anchor="middle">刺破泡沫 = 刺破 AI</text>
  <text class="node-text" x="650" y="650" text-anchor="middle">AI不是普通行业景气</text>
  <text class="node-text" x="650" y="675" text-anchor="middle">而是国家战略选择</text>

  <rect class="box-green" x="890" y="585" width="340" height="130"/>
  <text class="node-title" x="1060" y="620" text-anchor="middle">中美都没有动机刺破</text>
  <text class="node-text" x="1060" y="650" text-anchor="middle">美国：制造业回流 + AI平台经济</text>
  <text class="node-text" x="1060" y="675" text-anchor="middle">中国：十五五、新产业、改革开放延伸</text>

  <rect class="box-blue" x="1300" y="585" width="230" height="130"/>
  <text class="node-title" x="1415" y="620" text-anchor="middle">结论</text>
  <text class="node-text" x="1415" y="650" text-anchor="middle">AI泡沫暂不被主动戳破</text>
  <text class="node-text" x="1415" y="675" text-anchor="middle">长期资产定价获得支撑</text>

  <path class="arrow" d="M410 650 H475"/>
  <path class="arrow" d="M820 650 H885"/>
  <path class="arrow-strong" d="M1230 650 H1295"/>

  <!-- Section 3 -->
  <text class="section" x="70" y="790">三、核心抽象：AI不是产业题材，而是国家门票</text>
  <rect class="box-purple" x="70" y="820" width="330" height="140"/>
  <text class="node-title" x="235" y="855" text-anchor="middle">第三次工业革命</text>
  <text class="node-text" x="235" y="885" text-anchor="middle">参与者较多：G7等</text>
  <text class="node-text" x="235" y="910" text-anchor="middle">红利形式：全球化分工</text>
  <text class="small" x="235" y="935" text-anchor="middle">低端制造承接外部订单</text>

  <rect class="box-blue" x="470" y="820" width="330" height="140"/>
  <text class="node-title" x="635" y="855" text-anchor="middle">第四次工业革命</text>
  <text class="node-text" x="635" y="885" text-anchor="middle">作者判断：只有 G2 有门票</text>
  <text class="node-text" x="635" y="910" text-anchor="middle">门槛：算力、资本、市场、产业组织</text>
  <text class="small" x="635" y="935" text-anchor="middle">其他国家难以 1v1 单挑中或美</text>

  <rect class="box-green" x="870" y="820" width="330" height="140"/>
  <text class="node-title" x="1035" y="855" text-anchor="middle">G2竞争中发展</text>
  <text class="node-text" x="1035" y="885" text-anchor="middle">快速迭代、互相牵引</text>
  <text class="node-text" x="1035" y="910" text-anchor="middle">与其他国家差距被再度拉开</text>
  <text class="small" x="1035" y="935" text-anchor="middle">历史访问 = 关门节点</text>

  <rect class="box-amber" x="1270" y="820" width="260" height="140"/>
  <text class="node-title" x="1400" y="855" text-anchor="middle">非主导国角色</text>
  <text class="node-text" x="1400" y="885" text-anchor="middle">资源 / 能源供应</text>
  <text class="node-text" x="1400" y="910" text-anchor="middle">下游制造 / 材料 / 储存</text>
  <text class="small" x="1400" y="935" text-anchor="middle">受益但也更脆弱</text>

  <path class="arrow" d="M400 890 H465"/>
  <path class="arrow-strong" d="M800 890 H865"/>
  <path class="arrow" d="M1200 890 H1265"/>

  <!-- Section 4 -->
  <text class="section" x="70" y="1040">四、落到投资跟踪：最大雷解除后，只剩关键变量</text>
  <rect class="box-green" x="70" y="1070" width="340" height="130"/>
  <text class="node-title" x="240" y="1105" text-anchor="middle">三年过渡期假设</text>
  <text class="node-text" x="240" y="1135" text-anchor="middle">美国选择不冲突</text>
  <text class="node-text" x="240" y="1160" text-anchor="middle">行政通道顺畅，地缘风险不增加</text>

  <rect class="box-blue" x="480" y="1070" width="340" height="130"/>
  <text class="node-title" x="650" y="1105" text-anchor="middle">市场最大雷被拆除</text>
  <text class="node-text" x="650" y="1135" text-anchor="middle">war 风险下降</text>
  <text class="node-text" x="650" y="1160" text-anchor="middle">AI投资扩张仍有国家动机支持</text>

  <rect class="box-red" x="890" y="1070" width="340" height="130"/>
  <text class="node-title" x="1060" y="1105" text-anchor="middle">剩余核心风险变量</text>
  <text class="node-text" x="1060" y="1135" text-anchor="middle">通胀</text>
  <text class="node-text" x="1060" y="1160" text-anchor="middle">尤其是石油危机 / 石油美元潮汐</text>

  <rect class="box-purple" x="1300" y="1070" width="230" height="130"/>
  <text class="node-title" x="1415" y="1105" text-anchor="middle">终局判断</text>
  <text class="node-text" x="1415" y="1135" text-anchor="middle">能承受危机的国家</text>
  <text class="node-text" x="1415" y="1160" text-anchor="middle">才会被美国尊重</text>

  <path class="arrow" d="M410 1135 H475"/>
  <path class="arrow-strong" d="M820 1135 H885"/>
  <path class="arrow" d="M1230 1135 H1295"/>

  <!-- Cross links -->
  <path class="dash" d="M1035 480 C1035 520 1035 545 1035 580"/>
  <path class="dash" d="M1060 715 C1060 760 1035 775 1035 815"/>
  <path class="dash" d="M635 960 C635 1020 650 1035 650 1065"/>

  <!-- Footer -->
  <rect x="70" y="1245" width="1460" height="48" rx="14" ry="14" fill="#e2e8f0"/>
  <text class="small" x="800" y="1275" text-anchor="middle">阅读提示：这张图解析的是作者的推导框架，不代表对其中地缘、政策或市场判断做事实背书；投资决策仍需独立验证。</text>
</svg>
