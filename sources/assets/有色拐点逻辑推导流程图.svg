<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1920" viewBox="0 0 1600 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>

    <style><![CDATA[
      .bg { fill: #ffffff; }
      .title { font: 700 34px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif; fill:#0f172a; }
      .subtitle { font: 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif; fill:#475569; }
      .sectionText { font:700 20px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif; fill:#ffffff; }
      .nodeTitle { font:700 20px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif; fill:#0f172a; }
      .nodeText { font:15px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",sans-serif; fill:#1e293b; }
      .sectionBar { fill:#1e293b; }
      .node { stroke-width:2; rx:18; ry:18; filter:url(#shadow); }
      .blue { fill:#eff6ff; stroke:#93c5fd; }
      .green { fill:#ecfdf5; stroke:#86efac; }
      .orange { fill:#fff7ed; stroke:#fdba74; }
      .red { fill:#fef2f2; stroke:#fca5a5; }
      .purple { fill:#f5f3ff; stroke:#c4b5fd; }
      .gray { fill:#f8fafc; stroke:#cbd5e1; }
      .line { stroke:#64748b; stroke-width:2.6; fill:none; marker-end:url(#arrow); }
      .lineGreen { stroke:#059669; stroke-width:2.8; fill:none; marker-end:url(#arrowGreen); }
      .lineRed { stroke:#dc2626; stroke-width:2.8; fill:none; marker-end:url(#arrowRed); }
      .lineOrange { stroke:#ea580c; stroke-width:2.8; fill:none; marker-end:url(#arrowOrange); }
      .linePurple { stroke:#7c3aed; stroke-width:2.8; fill:none; marker-end:url(#arrowPurple); }
      .lineDashed { stroke:#94a3b8; stroke-width:2.4; stroke-dasharray:7 7; fill:none; marker-end:url(#arrow); }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1920"/>

  <text x="800" y="56" text-anchor="middle" class="title">有色拐点逻辑推导流程图（补充通胀逻辑版）</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">核心结论：有色真正的拐点，在“降息预期升温”；而降息预期的前提，是通胀预期下降与政策层对通胀容忍度的变化。</text>

  <rect x="70" y="130" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="155" text-anchor="middle" class="sectionText">一、当前约束：通胀抬头 → 降息受限 → 货币继续偏紧</text>

  <rect x="90" y="200" width="390" height="140" rx="18" ry="18" class="node orange"/>
  <text x="285" y="232" text-anchor="middle" class="nodeTitle">石油危机冲击</text>
  <text x="118" y="268" class="nodeText">• 油价上行，通胀抬头是“明牌”</text>
  <text x="118" y="296" class="nodeText">• 当前通胀与石油价格高度相关</text>

  <rect x="605" y="200" width="390" height="140" rx="18" ry="18" class="node red"/>
  <text x="800" y="232" text-anchor="middle" class="nodeTitle">降息会加剧通胀风险</text>
  <text x="633" y="268" class="nodeText">• 若过早降息，可能快速推高通胀</text>
  <text x="633" y="296" class="nodeText">• 因而短期不宜轻易降息</text>

  <rect x="1120" y="200" width="390" height="140" rx="18" ry="18" class="node red"/>
  <text x="1315" y="232" text-anchor="middle" class="nodeTitle">当前政策倾向</text>
  <text x="1148" y="268" class="nodeText">• 降息概率低</text>
  <text x="1148" y="296" class="nodeText">• 延后降息，甚至存在加息可能</text>

  <path d="M480 270 L605 270" class="lineRed"/>
  <path d="M995 270 L1120 270" class="lineRed"/>

  <rect x="70" y="390" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="415" text-anchor="middle" class="sectionText">二、美联储为何倾向先缩表：核心矛盾在美债与财政压力</text>

  <rect x="90" y="460" width="420" height="165" rx="18" ry="18" class="node purple"/>
  <text x="300" y="492" text-anchor="middle" class="nodeTitle">财政端压力</text>
  <text x="118" y="528" class="nodeText">• 财政部资金紧张</text>
  <text x="118" y="556" class="nodeText">• 美债利息支出约 1.2 万亿美元</text>
  <text x="118" y="584" class="nodeText">• 财政可支出空间被严重压缩</text>

  <rect x="590" y="460" width="420" height="165" rx="18" ry="18" class="node blue"/>
  <text x="800" y="492" text-anchor="middle" class="nodeTitle">美联储应对方式</text>
  <text x="618" y="528" class="nodeText">• 回归货币，不直接替财政扩张兜底</text>
  <text x="618" y="556" class="nodeText">• 更倾向通过缩表削弱基础货币供应速度</text>
  <text x="618" y="584" class="nodeText">• 以减缓利息支出膨胀速度</text>

  <rect x="1090" y="460" width="420" height="165" rx="18" ry="18" class="node green"/>
  <text x="1300" y="492" text-anchor="middle" class="nodeTitle">目标：软着陆</text>
  <text x="1118" y="528" class="nodeText">• 美债增长变慢，债务危机表现缓和</text>
  <text x="1118" y="556" class="nodeText">• 当财政盈余后，利息可被覆盖</text>
  <text x="1118" y="584" class="nodeText">• 即美债不违约，系统实现软着陆</text>

  <path d="M510 540 L590 540" class="line"/>
  <path d="M1010 540 L1090 540" class="lineGreen"/>

  <rect x="330" y="670" width="940" height="96" rx="18" ry="18" class="node gray"/>
  <text x="800" y="705" text-anchor="middle" class="nodeTitle">关键观察窗口：6/16</text>
  <text x="364" y="740" class="nodeText">需要观察缩表的路径、时间表与规模。缩表过快会引发市场振动，因此节奏非常关键。</text>
  <path d="M800 625 L800 670" class="lineDashed"/>

  <rect x="70" y="820" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="845" text-anchor="middle" class="sectionText">三、货币收紧如何传导到黄金与有色：强美元 / 美债压力缓和 → 黄金承压 → 有色走弱</text>

  <rect x="90" y="890" width="390" height="160" rx="18" ry="18" class="node blue"/>
  <text x="285" y="922" text-anchor="middle" class="nodeTitle">缩表是下一阶段的核心货币因子</text>
  <text x="118" y="958" class="nodeText">• 影响货币供给与资产定价</text>
  <text x="118" y="986" class="nodeText">• 市场已在交易“降息推迟、货币紧张”</text>
  <text x="118" y="1014" class="nodeText">• 接下来重点看缩表规模与进程</text>

  <rect x="605" y="890" width="390" height="160" rx="18" ry="18" class="node green"/>
  <text x="800" y="922" text-anchor="middle" class="nodeTitle">强美元与美元信用阶段性增强</text>
  <text x="633" y="958" class="nodeText">• 缩表降低美债危机表现</text>
  <text x="633" y="986" class="nodeText">• 美元指数抬头，市场追求强美元</text>
  <text x="633" y="1014" class="nodeText">• 黄金资产 / 美债资产 比值趋于小于 1</text>

  <rect x="1120" y="890" width="390" height="160" rx="18" ry="18" class="node red"/>
  <text x="1315" y="922" text-anchor="middle" class="nodeTitle">黄金与有色承压</text>
  <text x="1148" y="958" class="nodeText">• 黄金价格承压下跌</text>
  <text x="1148" y="986" class="nodeText">• 紫金矿业等黄金权重股受压</text>
  <text x="1148" y="1014" class="nodeText">• 有色第一权重下跌，带崩板块</text>

  <path d="M480 970 L605 970" class="lineGreen"/>
  <path d="M995 970 L1120 970" class="lineRed"/>

  <rect x="70" y="1105" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="1130" text-anchor="middle" class="sectionText">四、补充到“通胀逻辑”中的理念层：沃什如何理解通胀，决定降息节奏</text>

  <rect x="90" y="1175" width="320" height="210" rx="18" ry="18" class="node purple"/>
  <text x="250" y="1207" text-anchor="middle" class="nodeTitle">特朗普的人事选择</text>
  <text x="118" y="1243" class="nodeText">• 选择贝森特与沃什作为左膀右臂</text>
  <text x="118" y="1271" class="nodeText">• 目标是“美国优先 / 再次伟大”</text>
  <text x="118" y="1299" class="nodeText">• 显示政策取向偏向重塑美国竞争力</text>

  <rect x="450" y="1175" width="320" height="210" rx="18" ry="18" class="node purple"/>
  <text x="610" y="1207" text-anchor="middle" class="nodeTitle">理念源头：德鲁肯米勒</text>
  <text x="478" y="1243" class="nodeText">• 没有系统著作，只能从言论与行为推导</text>
  <text x="478" y="1271" class="nodeText">• 极度厌恶通货膨胀</text>
  <text x="478" y="1299" class="nodeText">• 其门生沃什大概率继承“重通胀控制”</text>

  <rect x="810" y="1175" width="320" height="210" rx="18" ry="18" class="node blue"/>
  <text x="970" y="1207" text-anchor="middle" class="nodeTitle">方法参考：格林斯潘</text>
  <text x="838" y="1243" class="nodeText">• 美国国力巅峰时期的重要美联储主席</text>
  <text x="838" y="1271" class="nodeText">• 重视对“真实通胀”的调查</text>
  <text x="838" y="1299" class="nodeText">• 轻宏观统计、重微观感知</text>
  <text x="838" y="1327" class="nodeText">• 非常重视降息节奏</text>

  <rect x="1170" y="1175" width="340" height="210" rx="18" ry="18" class="node orange"/>
  <text x="1340" y="1207" text-anchor="middle" class="nodeTitle">推导出的沃什逻辑</text>
  <text x="1198" y="1243" class="nodeText">• 可能更关注微观通胀而非单看统计局数据</text>
  <text x="1198" y="1271" class="nodeText">• CPI / 消费品价格指数更重要</text>
  <text x="1198" y="1299" class="nodeText">• 打压通胀可能是主要执行策略</text>
  <text x="1198" y="1327" class="nodeText">• 决定其对降息时点的容忍度</text>

  <path d="M410 1280 L450 1280" class="linePurple"/>
  <path d="M770 1280 L810 1280" class="linePurple"/>
  <path d="M1130 1280 L1170 1280" class="lineOrange"/>

  <rect x="70" y="1438" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="1463" text-anchor="middle" class="sectionText">五、通胀如何被压下去：两条主线 + 一个共同结果</text>

  <rect x="90" y="1510" width="420" height="180" rx="18" ry="18" class="node orange"/>
  <text x="300" y="1542" text-anchor="middle" class="nodeTitle">主线 A：石油价格是焦点</text>
  <text x="118" y="1578" class="nodeText">• 若要压制通胀，首先要压制油价</text>
  <text x="118" y="1606" class="nodeText">• 米伊局势 / 霍尔木兹海峡是否真正打开是关键</text>
  <text x="118" y="1634" class="nodeText">• 但狙击油价会损害俄罗斯利益，操作复杂</text>

  <rect x="590" y="1510" width="420" height="180" rx="18" ry="18" class="node green"/>
  <text x="800" y="1542" text-anchor="middle" class="nodeTitle">主线 B：中美贸易回暖</text>
  <text x="618" y="1578" class="nodeText">• 中国大量出口美国，压低消费品价格</text>
  <text x="618" y="1606" class="nodeText">• 消费品价格指数下行，通胀预期回落</text>
  <text x="618" y="1634" class="nodeText">• 这是另一条降低通胀预期的现实路径</text>

  <rect x="1090" y="1510" width="420" height="180" rx="18" ry="18" class="node blue"/>
  <text x="1300" y="1542" text-anchor="middle" class="nodeTitle">共同结果：强美元</text>
  <text x="1118" y="1578" class="nodeText">• 无论压制油价还是重塑贸易结构</text>
  <text x="1118" y="1606" class="nodeText">• 路径不同，但结果之一都是维持强美元</text>
  <text x="1118" y="1634" class="nodeText">• 强美元是压制通胀与稳信用的重要抓手</text>

  <path d="M1340 1385 L1300 1510" class="lineOrange"/>
  <path d="M1340 1385 C1340 1450 1340 1450 1340 1510" class="lineDashed"/>

  <rect x="70" y="1742" width="1460" height="38" rx="19" ry="19" class="sectionBar"/>
  <text x="800" y="1767" text-anchor="middle" class="sectionText">六、最终结论：何时才是有色真正拐点</text>

  <rect x="220" y="1810" width="1160" height="82" rx="18" ry="18" class="node green"/>
  <text x="800" y="1842" text-anchor="middle" class="nodeTitle">最终推导：通胀预期下降 → 降息预期升温 → 有色见底反转</text>
  <text x="254" y="1875" class="nodeText">若拐点来自中美贸易回暖，则中国经济基本面更强，股市走强概率更大；有色兼具周期与指数属性，往往同步走强。</text>

  <path d="M300 1690 C300 1760 460 1790 560 1810" class="lineGreen"/>
  <path d="M800 1690 L800 1810" class="lineGreen"/>
  <path d="M1300 1690 C1300 1760 1140 1790 1040 1810" class="lineGreen"/>

</svg>
