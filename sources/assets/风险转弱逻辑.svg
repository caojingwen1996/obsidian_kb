<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1650" viewBox="0 0 1800 1650">
<defs>
<style>
.bg{fill:#f8fafc}.title{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:36px;font-weight:800;fill:#0f172a}.subtitle{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:16px;fill:#475569}.section-title{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:22px;font-weight:800;fill:#111827}.node-title{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:18px;font-weight:800;fill:#0f172a}.node-text{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;fill:#334155}.small{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:13px;fill:#475569}.tag{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:13px;font-weight:700}.label{font-family:'Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif;font-size:13px;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:1.4;rx:16;ry:16;filter:url(#shadow)}.soft{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:1.2;rx:18;ry:18}.arrow{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#arrowhead)}.dash{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:7 7;marker-end:url(#arrowhead)}
</style>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/></filter>
<marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/></marker>
</defs>
<rect width="1800" height="1650" class="bg"/>
<text x="70" y="70" class="title">风险转弱的节点：逻辑推导图（增强版）</text>
<text x="70" y="103" class="subtitle">抽象主线：风险来源 → 风险转弱 → 节点确认 → 三要素同步有利 → 买入判断；熊市路径用于反向验证。</text>
<text x="70" y="155" class="section-title">一、四类风险来源</text>
<rect x="70" y="180" width="360" height="150" class="box"/>
<rect x="70" y="180" width="8" height="150" rx="4" fill="#dc2626"/>
<text x="94" y="214" class="node-title">基本面风险</text>
<text x="94" y="246" class="node-text">企业人/交易制度/产能过剩/</text>
<text x="94" y="269" class="node-text">盈利恶化，引发经营与信用不确定性。</text>
<rect x="500" y="180" width="360" height="150" class="box"/>
<rect x="500" y="180" width="8" height="150" rx="4" fill="#ea580c"/>
<text x="524" y="214" class="node-title">情绪面风险</text>
<text x="524" y="246" class="node-text">亏钱效应 → 担忧恐惧 →</text>
<text x="524" y="269" class="node-text"> 羊群踩踏；量化/游资/</text>
<text x="524" y="292" class="node-text">机构会放大波动。</text>
<rect x="930" y="180" width="360" height="150" class="box"/>
<rect x="930" y="180" width="8" height="150" rx="4" fill="#2563eb"/>
<text x="954" y="214" class="node-title">流动性风险</text>
<text x="954" y="246" class="node-text">流动性推动 PE 与泡沫；</text>
<text x="954" y="269" class="node-text">泡沫破灭时出现挤压、赎回、闪崩。</text>
<rect x="1360" y="180" width="360" height="150" class="box"/>
<rect x="1360" y="180" width="8" height="150" rx="4" fill="#7c3aed"/>
<text x="1384" y="214" class="node-title">估值风险</text>
<text x="1384" y="246" class="node-text">缺少估值锚时市场混乱，投机恶化，</text>
<text x="1384" y="269" class="node-text">市场功能退化。</text>
<path d="M 250 330 C 575.0 330, 575.0 390, 900 390" class="arrow"/>
<rect x="517.0" y="344.0" width="116" height="26" rx="13" fill="#fff" stroke="#cbd5e1"/>
<text x="575.0" y="363.0" class="label" text-anchor="middle">风险累积</text>
<path d="M 680 330 C 790.0 330, 790.0 390, 900 390" class="arrow"/>
<path d="M 1110 330 C 1005.0 330, 1005.0 390, 900 390" class="arrow"/>
<path d="M 1540 330 C 1220.0 330, 1220.0 390, 900 390" class="arrow"/>
<rect x="735" y="390" width="430" height="105" class="box"/>
<rect x="735" y="390" width="8" height="105" rx="4" fill="#334155"/>
<text x="759" y="424" class="node-title">风险强化结果</text>
<rect x="1015" y="404" width="126" height="26" rx="13" fill="#334155" opacity="0.12"/>
<text x="1029" y="423" class="tag" fill="#334155">风险偏强</text>
<text x="759" y="456" class="node-text">悲观预期、估值失锚、流动性挤兑、情绪踩踏相互放大。</text>
<text x="70" y="560" class="section-title">二、“转弱”具体含义与对应风险类型</text>
<rect x="70" y="590" width="780" height="170" class="box"/>
<rect x="70" y="590" width="8" height="170" rx="4" fill="#2563eb"/>
<text x="94" y="624" class="node-title">宏观转弱</text>
<rect x="700" y="604" width="126" height="26" rx="13" fill="#2563eb" opacity="0.12"/>
<text x="714" y="623" class="tag" fill="#2563eb">转弱解释</text>
<text x="94" y="656" class="node-text">美国降息预期出现，美元高利率与全球流动性收缩的压制开始松动；</text>
<text x="94" y="679" class="node-text">油金铜锚定降低美元权重，外部资金环境从压制转向支持。</text>
<text x="94" y="702" class="node-text">主要对应：流动性风险转弱；间接影响估值风险、情绪风险。</text>
<rect x="920" y="590" width="780" height="170" class="box"/>
<rect x="920" y="590" width="8" height="170" rx="4" fill="#16a34a"/>
<text x="944" y="624" class="node-title">中观转弱</text>
<rect x="1550" y="604" width="126" height="26" rx="13" fill="#16a34a" opacity="0.12"/>
<text x="1564" y="623" class="tag" fill="#16a34a">转弱解释</text>
<text x="944" y="656" class="node-text">经济周期从去年萧条转向今年复苏；GDP、统计数据有利，行业景气从去库存/</text>
<text x="944" y="679" class="node-text">价格下行/利润承压，转向库存周期改善与盈利预期修复。</text>
<text x="944" y="702" class="node-text">主要对应：行业周期层面的基本面风险转弱；部分降低估值风险。</text>
<rect x="70" y="800" width="780" height="170" class="box"/>
<rect x="70" y="800" width="8" height="170" rx="4" fill="#0891b2"/>
<text x="94" y="834" class="node-title">微观转弱</text>
<rect x="700" y="814" width="126" height="26" rx="13" fill="#0891b2" opacity="0.12"/>
<text x="714" y="833" class="tag" fill="#0891b2">转弱解释</text>
<text x="94" y="866" class="node-text">落到行业、企业、个股：产能、成本、效益改善；产能过剩转向供给侧改革，</text>
<text x="94" y="889" class="node-text">库存周期转向，需求端刺激，企业盈利能力预期加强。</text>
<text x="94" y="912" class="node-text">主要对应：企业经营风险、盈利风险、产业竞争风险转弱，归入基本面风险。</text>
<rect x="920" y="800" width="780" height="170" class="box"/>
<rect x="920" y="800" width="8" height="170" rx="4" fill="#f59e0b"/>
<text x="944" y="834" class="node-title">交易转弱</text>
<rect x="1550" y="814" width="126" height="26" rx="13" fill="#f59e0b" opacity="0.12"/>
<text x="1564" y="833" class="tag" fill="#f59e0b">转弱解释</text>
<text x="944" y="866" class="node-text">情绪化让步于理性；冰点后试错、接力、突破高度压制，畏高风险下降；</text>
<text x="944" y="889" class="node-text">增量资金热情被流动性与情绪共同激发。</text>
<text x="944" y="912" class="node-text">主要对应：情绪面风险转弱；同时改善流动性风险。</text>
<path d="M 950 495 C 705.0 495, 705.0 590, 460 590" class="arrow"/>
<rect x="647.0" y="526.5" width="116" height="26" rx="13" fill="#fff" stroke="#cbd5e1"/>
<text x="705.0" y="545.5" class="label" text-anchor="middle">开始转弱</text>
<path d="M 950 495 C 1130.0 495, 1130.0 590, 1310 590" class="arrow"/>
<text x="70" y="1045" class="section-title">三、节点确认：从“转弱”到“可以买”的条件</text>
<rect x="70" y="1075" width="390" height="165" class="box"/>
<rect x="70" y="1075" width="8" height="165" rx="4" fill="#0f766e"/>
<text x="94" y="1109" class="node-title">交易窗口节点</text>
<rect x="310" y="1089" width="126" height="26" rx="13" fill="#0f766e" opacity="0.12"/>
<text x="324" y="1108" class="tag" fill="#0f766e">时间窗口</text>
<text x="94" y="1141" class="node-text">冰点的冰点转折；指数希望与信心共振；</text>
<text x="94" y="1164" class="node-text">供给侧改革触发库存周期有利；长周期变化与发展</text>
<text x="94" y="1187" class="node-text">信心出现。</text>
<rect x="520" y="1075" width="390" height="165" class="box"/>
<rect x="520" y="1075" width="8" height="165" rx="4" fill="#7c3aed"/>
<text x="544" y="1109" class="node-title">体系三要素有利</text>
<rect x="760" y="1089" width="126" height="26" rx="13" fill="#7c3aed" opacity="0.12"/>
<text x="774" y="1108" class="tag" fill="#7c3aed">结构条件</text>
<text x="544" y="1141" class="node-text">竞争格局比较优势有利；流动性辩证分析有利；</text>
<text x="544" y="1164" class="node-text">情绪位置变化有利。</text>
<rect x="970" y="1075" width="370" height="165" class="box"/>
<rect x="970" y="1075" width="8" height="165" rx="4" fill="#059669"/>
<text x="994" y="1109" class="node-title">同步确认</text>
<rect x="1190" y="1089" width="126" height="26" rx="13" fill="#059669" opacity="0.12"/>
<text x="1204" y="1108" class="tag" fill="#059669">共振</text>
<text x="994" y="1141" class="node-text">只有宏观/中观/微观/交易同时改善，</text>
<text x="994" y="1164" class="node-text">且三要素同步有利，才从“风险转弱”进入“胜</text>
<text x="994" y="1187" class="node-text">率提高”。</text>
<rect x="1400" y="1075" width="300" height="165" class="box"/>
<rect x="1400" y="1075" width="8" height="165" rx="4" fill="#dc2626"/>
<text x="1424" y="1109" class="node-title">买入不败</text>
<rect x="1550" y="1089" width="126" height="26" rx="13" fill="#dc2626" opacity="0.12"/>
<text x="1564" y="1108" class="tag" fill="#dc2626">结论</text>
<text x="1424" y="1141" class="node-text">不是单点利好，而是风险链条同步松动</text>
<text x="1424" y="1164" class="node-text">后的高胜率窗口。</text>
<path d="M 460 1155 C 490.0 1155, 490.0 1155, 520 1155" class="arrow"/>
<path d="M 910 1155 C 940.0 1155, 940.0 1155, 970 1155" class="arrow"/>
<path d="M 1340 1155 C 1370.0 1155, 1370.0 1155, 1400 1155" class="arrow"/>
<path d="M 460 970 C 460 1030, 265 1030, 265 1075" class="dash"/>
<path d="M 1310 970 C 1310 1030, 715 1030, 715 1075" class="dash"/>
<path d="M 460 970 C 460 1030, 1155 1030, 1155 1075" class="dash"/>
<path d="M 1310 970 C 1310 1030, 1550 1030, 1550 1075" class="dash"/>
<text x="70" y="1310" class="section-title">四、熊市反向验证：如果这些风险重新强化，转弱逻辑失败</text>
<rect x="70" y="1340" width="520" height="170" class="box"/>
<rect x="70" y="1340" width="8" height="170" rx="4" fill="#dc2626"/>
<text x="94" y="1374" class="node-title">竞争加剧</text>
<rect x="440" y="1354" width="126" height="26" rx="13" fill="#dc2626" opacity="0.12"/>
<text x="454" y="1373" class="tag" fill="#dc2626">反向路径</text>
<text x="94" y="1406" class="node-text">劣币驱逐良币 → 产能过剩 → 同质化竞争 →</text>
<text x="94" y="1429" class="node-text"> 利润被侵蚀 → 行业走熊。</text>
<text x="94" y="1452" class="node-text">基本面风险重新强化</text>
<rect x="645" y="1340" width="520" height="170" class="box"/>
<rect x="645" y="1340" width="8" height="170" rx="4" fill="#2563eb"/>
<text x="669" y="1374" class="node-title">流动性衰竭</text>
<rect x="1015" y="1354" width="126" height="26" rx="13" fill="#2563eb" opacity="0.12"/>
<text x="1029" y="1373" class="tag" fill="#2563eb">反向路径</text>
<text x="669" y="1406" class="node-text">亏钱效应 → 基金赎回 → 越赎回越跌 →</text>
<text x="669" y="1429" class="node-text"> 恶性循环 → 闪崩。</text>
<text x="669" y="1452" class="node-text">流动性风险重新强化</text>
<rect x="1220" y="1340" width="520" height="170" class="box"/>
<rect x="1220" y="1340" width="8" height="170" rx="4" fill="#7f1d1d"/>
<text x="1244" y="1374" class="node-title">信用崩塌</text>
<rect x="1590" y="1354" width="126" height="26" rx="13" fill="#7f1d1d" opacity="0.12"/>
<text x="1604" y="1373" class="tag" fill="#7f1d1d">反向路径</text>
<text x="1244" y="1406" class="node-text">短视 → 道德风险 → 违法 → 做空力量压倒做多力</text>
<text x="1244" y="1429" class="node-text">量 → 发展信心动摇。</text>
<text x="1244" y="1452" class="node-text">基本面/情绪/估值风险共振</text>
<rect x="70" y="1550" width="1660" height="52" rx="16" fill="#e2e8f0" opacity="0.75"/>
<text x="95" y="1582" class="small">阅读方法：宏观看外部流动性，中观看行业周期，微观看企业盈利，交易看情绪位置；四者共同指向“风险转弱”，再用三要素确认胜率。</text>
</svg>